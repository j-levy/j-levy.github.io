params:
  title: Jonathan LEVY
  description: My presentation
  favicon: /favicon-96x96.png
  # staticPath: ""  # The path to serve the static files from


  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: false

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  # color:
  #   textColor: "#343a40"
  #   secondaryTextColor: "#6c757d"
  #   textLinkColor: "#007bff"
  #   backgroundColor: "#eaedf0"
  #   secondaryBackgroundColor: "#64ffda1a"
  #   primaryColor: "#007bff"
  #   secondaryColor: "#f8f9fa"

  #   darkmode:
  #     textColor: "#e4e6eb"
  #     secondaryTextColor: "#b0b3b8"
  #     textLinkColor: "#ffffff"
  #     backgroundColor: "#18191a"
  #     secondaryBackgroundColor: "#212529"
  #     primaryColor: "#ffffff"
  #     secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Jonathan LEVY" # Brand name for the brand | default is the title variable
    disableSearch: false
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero

  hero:
    enable: true
    intro: Hi, my name is
    title: Jonathan LEVY.
    subtitle: I develop software. Maybe for you?
    content: >-
      Whether it's working on desktop programs, high-performance computing
      software or just a website, when I'd like something to exist, I may end up
      doing it myself. 
    image: /images/hero-hinotou.jpg
    button:
      enable: true
      name: Resume
      url: /assets/resume_jonathan_levy.pdf
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/j-levy
        - icon: fab fa-github-alt
          url: https://github.com/yattoz
  
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false

  about:
    enable: true
    title: About Me
    image: /images/photo.jpg
    content: >
      I am a French software developer, I like both low-level programming
      involving memory management or thread concurrency, and implementing
      graphical interfaces. My background is a mix of computer engineering,
      computer science and mechatronics, with a hint of science teaching. 


      With a knack for multiculturalism and travel, I had the opportunity to
      study in France, the Netherlands and Japan, first in mechatronics
      engineering, then in Computer Science and high-performance computing with
      GPUs. Today, I work at Qualcomm Technologies (Cork, Ireland) on DirectX 12
      driver and in particular raytracing support, for the latest generation of
      Adreno GPUs.
    skills:
      enable: true
      title: 'Here are a few technologies I recently worked with:'
      items:
        - C++
        - Low-level
        - DirectX 12
        - Linux & Windows
        - Python
        - Git


  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - company: Qualcomm Technologies
        companyUrl: https://www.qualcomm.com
        jobs: 
        - name: Software Engineer - Graphics
          date: Jun. 2023 - Now
          featuredItems:
            customIcons:
              - icon: /images/qualcomm.png
                url: "https://www.qualcomm.com"
